server {
    listen       80;
    server_name  localhost;

    # Vite with base: "./" generates relative paths, so the root suffices
    root   /usr/share/nginx/html;
    index  index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache-busting for Vite hashed assets
    location ~* \.(?:css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # WASM MIME type - only this location, so we don't clobber the default types
    location ~* \.wasm$ {
        types { }
        default_type application/wasm;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
